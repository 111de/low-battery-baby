<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>低电量宝宝安慰站</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #ffe5ef 0, transparent 35%),
        radial-gradient(circle at bottom right, #fff0c9 0, transparent 35%),
        linear-gradient(135deg, #fff8fb, #fff3e4);
      color: #5b3f45;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 680px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 190, 210, 0.6);
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(255, 160, 190, 0.25);
      padding: 26px 22px;
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      opacity: 0.35;
      pointer-events: none;
    }

    .bubble.one {
      width: 110px;
      height: 110px;
      background: #ffd1df;
      right: -35px;
      top: 80px;
    }

    .bubble.two {
      width: 90px;
      height: 90px;
      background: #ffe1a8;
      left: -30px;
      bottom: 120px;
    }

    .header {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .emoji {
      font-size: 54px;
      margin-bottom: 8px;
      animation: float 2.8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #4f333a;
      letter-spacing: 1px;
    }

    .subtitle {
      margin: 10px 0 22px;
      font-size: 15px;
      color: #8a6970;
    }

    .battery-card {
      background: #fff7fa;
      border: 1px solid #ffd6e1;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .battery-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #7c5c62;
    }

    .battery-shell {
      width: 100%;
      height: 22px;
      border-radius: 999px;
      background: #f3dfe5;
      overflow: hidden;
      border: 2px solid #efc7d2;
    }

    .battery-fill {
      width: 23%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff9fba, #ffc66d);
      transition: width 0.5s ease;
    }

    .message-card {
      min-height: 150px;
      background: linear-gradient(145deg, #ffffff, #fff6f8);
      border-radius: 28px;
      border: 1px solid #ffd6e1;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      padding: 24px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .message {
      font-size: 19px;
      line-height: 1.7;
      color: #5a3b42;
    }

    .main-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #ff8fb2, #ffb86c);
      box-shadow: 0 10px 24px rgba(255, 143, 178, 0.35);
      cursor: pointer;
      transition: 0.18s ease;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .main-btn:active {
      transform: scale(0.97);
      box-shadow: 0 6px 14px rgba(255, 143, 178, 0.28);
    }

    .moods {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .mood-btn {
      border: none;
      border-radius: 18px;
      padding: 12px 10px;
      background: #fff1f5;
      color: #6a4a51;
      font-size: 15px;
      cursor: pointer;
      border: 1px solid #ffd4df;
      transition: 0.15s ease;
    }

    .mood-btn:active {
      transform: scale(0.96);
      background: #ffe5ed;
    }

    .license {
      background: #fffaf0;
      border: 1px dashed #f1bf7a;
      border-radius: 22px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.6;
      color: #735542;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .small-actions {
      display: flex;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .small-btn {
      flex: 1;
      border: none;
      border-radius: 18px;
      padding: 12px;
      background: #f9e9ff;
      color: #6a4d74;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #e9cafa;
    }

    .small-btn:nth-child(2) {
      background: #eef8ff;
      border-color: #c7e7ff;
      color: #4b6170;
    }
    .photo-card,
.chat-card {
  background: #fff7fa;
  border: 1px solid #ffd6e1;
  border-radius: 24px;
  padding: 16px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}

.photo-card h2,
.chat-card h2 {
  margin: 0 0 8px;
  font-size: 18px;
  color: #5a3b42;
}

.photo-card p {
  margin: 0 0 12px;
  font-size: 14px;
  color: #8a6970;
}

.upload-label {
  display: inline-block;
  padding: 10px 16px;
  border-radius: 999px;
  background: #ffe7ef;
  border: 1px solid #ffc7d8;
  color: #6a4a51;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 12px;
}

.upload-label input {
  display: none;
}

.photo-preview {
  width: 100%;
  min-height: 160px;
  border-radius: 20px;
  background: #fff;
  border: 1px dashed #ffc7d8;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #a4868d;
  overflow: hidden;
}

.photo-preview img {
  width: 100%;
  height: 100%;
  max-height: 240px;
  object-fit: cover;
  display: block;
}

.chat-box {
  height: 210px;
  overflow-y: auto;
  background: #ffffff;
  border: 1px solid #ffd6e1;
  border-radius: 20px;
  padding: 12px;
  margin-bottom: 12px;
}

.chat {
  max-width: 82%;
  padding: 10px 12px;
  border-radius: 18px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.5;
}

.chat.bot {
  background: #fff0f5;
  color: #5a3b42;
  border-bottom-left-radius: 6px;
}

.chat.user {
  background: #ffe1ae;
  color: #5a3b42;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}

.chat-input-area {
  display: flex;
  gap: 8px;
}

.chat-input-area input {
  flex: 1;
  border: 1px solid #ffd0dc;
  border-radius: 999px;
  padding: 12px 14px;
  font-size: 14px;
  outline: none;
  background: #fff;
  color: #5a3b42;
}

.chat-input-area button {
  border: none;
  border-radius: 999px;
  padding: 0 16px;
  background: linear-gradient(135deg, #ff8fb2, #ffb86c);
  color: white;
  font-weight: 700;
  cursor: pointer;
}

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #a4868d;
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(78, 55, 62, 0.9);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 380px) {
      .app {
        min-height: 640px;
        padding: 22px 18px;
      }

      h1 {
        font-size: 26px;
      }

      .message {
        font-size: 17px;
      }
    }
  </style>
</head>

<section class="chat-card">

  </div>

  <div class="chat-input-area">
    <input id="chatInput" type="text" placeholder="比如：我今天好累..." />
    <button id="sendBtn">发送</button>
  </div>
</section>

    <section class="small-actions">

    const emojis = ["🪫", "🥺", "🧸", "🍮", "☁️", "🌙", "🐾", "🍓"];

    const messageEl = document.getElementById("message");
    const comfortBtn = document.getElementById("comfortBtn");
    const moodBtns = document.querySelectorAll(".mood-btn");
    const batteryText = document.getElementById("batteryText");
    const batteryFill = document.getElementById("batteryFill");
    const licenseEl = document.getElementById("license");
    const patBtn = document.getElementById("patBtn");
    const restBtn = document.getElementById("restBtn");
    const countEl = document.getElementById("count");
    const toast = document.getElementById("toast");
    const mainEmoji = document.getElementById("mainEmoji");

    let battery = 23;
    let count = Number(localStorage.getItem("comfortCount") || 0);
    countEl.textContent = count;

    function randomFrom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function chargeBattery(amount = 7) {
      battery = Math.min(100, battery + amount);
      batteryText.textContent = battery + "%";
      batteryFill.style.width = battery + "%";

      if (battery >= 80) {
        mainEmoji.textContent = "🔋";
      } else if (battery >= 50) {
        mainEmoji.textContent = "🌷";
      } else {
        mainEmoji.textContent = randomFrom(emojis);
      }
    }

    function showMessage(type = "normal") {
      messageEl.textContent = randomFrom(messages[type]);
      chargeBattery(Math.floor(Math.random() * 8) + 4);

      count++;
      countEl.textContent = count;
      localStorage.setItem("comfortCount", count);
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    comfortBtn.addEventListener("click", () => {
      showMessage("normal");
    });

    moodBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const mood = btn.dataset.mood;
        showMessage(mood);
      });
    });

    patBtn.addEventListener("click", () => {
      chargeBattery(5);
      showToast("摸摸头成功，宝宝电量 +5%");
    });

    restBtn.addEventListener("click", () => {
      licenseEl.textContent = randomFrom(licenses);
      showToast("新的休息许可已生成");
    });
    const photoInput = document.getElementById("photoInput");
const photoPreview = document.getElementById("photoPreview");

photoInput.addEventListener("change", () => {
  const file = photoInput.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    photoPreview.innerHTML = `<img src="${event.target.result}" alt="今日充电照片" />`;
    showToast("今日充电照片已放好啦");
    chargeBattery(8);
  };

  reader.readAsDataURL(file);
});

function addChatMessage(text, sender) {
  const div = document.createElement("div");
  div.className = `chat ${sender}`;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendChat() {
  const text = chatInput.value.trim();

  if (!text) {
    showToast("宝宝还没说话呢");
    return;
  }

  addChatMessage(text, "user");
  chatInput.value = "";

  setTimeout(() => {
    const reply = getBotReply(text);
    addChatMessage(reply, "bot");
    chargeBattery(4);
  }, 450);
}

sendBtn.addEventListener("click", sendChat);

chatInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    sendChat();
  }
});
